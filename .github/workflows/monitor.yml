name: Claude API Monitor

"on":
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached status
        uses: actions/cache/restore@v4
        with:
          path: last_status.json
          key: claude-status-${{ github.run_number }}
          restore-keys: |
            claude-status-

      - name: Check Claude API status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 check_status.py

      - name: Save status cache
        uses: actions/cache/save@v4
        with:
          path: last_status.json
          key: claude-status-${{ github.run_number }}
